<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V我50 文案机</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="generator-card">
        <div class="hero-strip" aria-hidden="true">
          <span class="stripe"></span>
          <span class="stripe wide"></span>
          <span class="stripe"></span>
        </div>

        <header class="hero">
          <div>
            <h1>V我50 文案机</h1>
          </div>
          <div class="food-mark" aria-hidden="true">
            <img src="assets/food-combo.png" alt="" />
          </div>
        </header>

        <div class="controls">
          <div class="field">
            <label for="keywords">关键词（可选）</label>
            <input id="keywords" type="text" placeholder="例如：加班、ddl、恋爱脑" maxlength="20" />
          </div>

          <fieldset class="style-field">
            <legend>主题 / 风格</legend>
            <div class="style-options" id="styleOptions">
              <button class="style-chip active" type="button" data-style="随机">随机</button>
              <button class="style-chip" type="button" data-style="发疯文学">发疯文学</button>
              <button class="style-chip" type="button" data-style="打工人">打工人</button>
              <button class="style-chip" type="button" data-style="恋爱脑">恋爱脑</button>
              <button class="style-chip" type="button" data-style="学生党">学生党</button>
              <button class="style-chip" type="button" data-style="时事热梗">时事热梗</button>
              <button class="style-chip" type="button" data-style="玄学求助">玄学求助</button>
              <button class="style-chip" type="button" data-style="群聊日常">群聊日常</button>
            </div>
          </fieldset>

          <div class="button-row">
            <button id="generateBtn" class="btn primary" type="button">生成文案</button>
          </div>
        </div>

        <section class="result-wrap" aria-live="polite">
          <div class="result-head">
            <div>
              <p class="section-kicker">今日小票</p>
              <h2>当前文案</h2>
            </div>
            <button id="copyBtn" class="copy-btn">复制</button>
          </div>
          <p id="resultText" class="result-text">点击“生成文案”，领取你今天的 V50 文学。</p>
          <p id="copyFeedback" class="copy-feedback" aria-live="polite"></p>
        </section>
      </section>

      <section class="history-card">
        <div class="history-head">
          <div>
            <p class="section-kicker">灵感回收站</p>
            <h2>最近 5 条</h2>
          </div>
          <button id="clearHistoryBtn" class="text-btn subtle">清空</button>
        </div>
        <ul id="historyList" class="history-list">
          <li class="empty">暂无历史，先生成一条试试。</li>
        </ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
